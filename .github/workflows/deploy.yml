# .github/workflows/deploy.yml
# 生产部署：GHA 只做 SSH 触发，build/push 在服务器（国内）执行 ——
# 避开 GHA 境外 runner push 天翼云的跨境瓶颈（实测 ~30KB/s，148MB 层要近 2h）。
# 与 tuangou 项目同链路：服务器 docker build → docker push 天翼云（国内→国内）→ compose up。
#
# 链路：push main / workflow_dispatch
#   → SSH 到服务器执行 scripts/deploy.sh
#     → git pull → 起后端 → migrate → 部署 function
#     → docker login 天翼云 → docker build 前端（服务器本地）→ docker push 天翼云
#     → 生成 nginx 配置 → compose up web nginx（web 用本地 build 的镜像）
#
# Secrets：
#   SSH_HOST / SSH_USER / SSH_KEY / DEPLOY_PATH   服务器 SSH 访问
#   CTYUN_USER / CTYUN_PASSWORD                   服务器 docker login 天翼云（push 前端镜像用）
#   （NEXT_PUBLIC_INSFORGE_URL / ANON_KEY 由服务器 deploy/.env 提供，build 时注入）
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 到服务器执行部署
        uses: appleboy/ssh-action@v1.2.0
        env:
          CTYUN_USER: ${{ secrets.CTYUN_USER }}
          CTYUN_PASSWORD: ${{ secrets.CTYUN_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: CTYUN_USER,CTYUN_PASSWORD
          script_stop: true
          command_timeout: 30m
          script: |
            export CTYUN_USER CTYUN_PASSWORD
            cd ${{ secrets.DEPLOY_PATH }}
            bash scripts/deploy.sh
