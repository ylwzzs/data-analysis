# .github/workflows/deploy.yml
# 生产部署：GHA 把代码 rsync 到服务器 → SSH 触发 deploy.sh（服务器 build/push）。
# 避开两个跨境瓶颈：
#   1) GHA 境外 runner push 天翼云(国内) ~30KB/s —— build/push 移到服务器（国内→国内）
#   2) 服务器(国内) git pull GitHub 偶发 TLS 中断 —— 改用 GHA rsync 推代码（同 tuangou 项目）
#
# 链路：push main / workflow_dispatch
#   → quality job: lint(警告模式) + type-check(必须通过) + function-check(必须通过)
#   → checkout → rsync 代码到服务器（排除 .git/node_modules/.next/.env）
#   → SSH 执行 deploy.sh：起后端 → migrate → function
#     → docker login 天翼云 → docker build 前端（服务器）→ docker push 天翼云 → compose up
#
# Secrets：
#   SSH_HOST / SSH_USER / SSH_KEY / DEPLOY_PATH   服务器 SSH 访问
#   CTYUN_USERNAME / CTYUN_PASSWORD               服务器 docker login 天翼云（push 前端镜像用）
#   （NEXT_PUBLIC_INSFORGE_URL / ANON_KEY 由服务器 deploy/.env 提供，build 时注入）
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # 质量门禁：lint(警告) + type-check + function 校验
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm install

      - name: Lint (warnings allowed)
        run: cd web && npm run lint || echo "::warning::Lint has issues - check logs"
        continue-on-error: true

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Check edge functions
        run: bash scripts/check-functions.sh

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync 代码到服务器
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./web ./scripts ./database ./deploy ./functions ./services \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: SSH 执行部署
        uses: appleboy/ssh-action@v1.2.0
        env:
          CTYUN_USERNAME: ${{ secrets.CTYUN_USERNAME }}
          CTYUN_PASSWORD: ${{ secrets.CTYUN_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: CTYUN_USERNAME,CTYUN_PASSWORD
          script_stop: true
          command_timeout: 30m
          script: |
            export CTYUN_USERNAME CTYUN_PASSWORD
            cd ${{ secrets.DEPLOY_PATH }}
            bash scripts/deploy.sh
