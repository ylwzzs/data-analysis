# deploy/docker-compose.yml
# InsForge 数据分析平台 —— base 后端栈（本地开发与生产共用，保证两环境后端同构）。
#
# 本地开发：cd deploy && docker compose up -d
#   自动合并 docker-compose.override.yml，把后端端口映射到宿主机；前端用 `npm run dev`。
# 生产部署：cd deploy && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   叠加 web 前端 + nginx 网关；后端端口不对公网暴露，仅 nginx 暴露 80/443。
#
# 本文件的后端服务默认不做宿主机端口映射（仅 compose network 内部互通）；
# 是否对外暴露由 dev/prod override 决定。
# WECOM_* 不在这里配置 —— 它们是 function secret，由 scripts/deploy-functions.sh
# 通过 InsForge API 注入（function 用 Deno.env.get 读取）。

services:
  postgres:
    image: caj9ik14016wep.xuanyuan.run/insforge/postgres-all:latest
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in deploy/.env (不再回退 JWT_SECRET，防 key 漂移导致 secret 解密失败)}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/migrations:/migrations:ro # 供 scripts/migrate.sh 读取
    networks:
      - insforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: caj9ik14016wep.xuanyuan.run/postgrest/postgrest:v12.2.12
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-in-production}
      # schema 变更时通过 NOTIFY 自动 reload
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_CHANNEL: pgrst
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insforge-network
    # postgrest 官方镜像为 distroless（无 sh/bash/wget），无法内置 healthcheck；
    # 它秒级 ready，靠 insforge 运行时连接 + 重试保证可用。

  insforge:
    image: caj9ik14016wep.xuanyuan.run/insforge/insforge-oss:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    environment:
      - PORT=7130
      - PROJECT_ROOT=/app
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in deploy/.env (不再回退 JWT_SECRET，防 key 漂移导致 secret 解密失败)}
      - ROOT_ADMIN_USERNAME=${ROOT_ADMIN_USERNAME:-admin}
      - ROOT_ADMIN_PASSWORD=${ROOT_ADMIN_PASSWORD:-${ADMIN_PASSWORD:-change-this-password}}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-this-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - LOGS_DIR=/insforge-logs
      - INSFORGE_TELEMETRY_DISABLED=1
      - STORAGE_DIR=/insforge-storage
      # Deno runtime 地址（精简 compose 易漏此项，缺失会导致 function invoke 502）
      - DENO_RUNTIME_URL=http://deno:7133
    volumes:
      - storage-data:/insforge-storage
      - insforge-logs:/insforge-logs
    networks:
      - insforge-network

  deno:
    image: caj9ik14016wep.xuanyuan.run/insforge/deno-runtime:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - postgres
      - postgrest
    environment:
      - PORT=7133
      - DENO_ENV=development
      - DENO_DIR=/deno-dir
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGREST_BASE_URL=http://postgrest:3000
      # function 内 createClient 访问 InsForge API 的地址（deno 容器视角 → insforge 服务）。
      # 用 INSFORGE_API_BASE 而非 INSFORGE_BASE_URL：后者是 reserved secret（值为主服务视角的
      # localhost:7130，function 在独立 deno 容器里连不上），reserved 会覆盖容器 env。
      - INSFORGE_API_BASE=http://insforge:7130
      - WORKER_TIMEOUT_MS=${WORKER_TIMEOUT_MS:-60000}
      # function secrets 用此 key 解密；必须与 insforge 服务一致
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in deploy/.env (不再回退 JWT_SECRET，防 key 漂移导致 secret 解密失败)}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
    volumes:
      - deno_cache:/deno-dir
    networks:
      - insforge-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7133/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  duckdb:
    image: registry-crs-xinan1.ctyun.cn/hookflow/duckdb-service:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DUCKDB_PORT=9000
      - S3_ENDPOINT=${S3_ENDPOINT:-http://xinan-1-internal.zos.ctyun.cn}
      - S3_ACCESS_KEY=${OOS_ACCESS_KEY}
      - S3_SECRET_KEY=${OOS_SECRET_KEY}
      - S3_BUCKET=${OOS_BUCKET:-lemeng-datasource}
      # PostgreSQL 连接（/compute 写入汇总结果）
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=${POSTGRES_DB:-insforge}
      - PG_USER=${POSTGRES_USER:-postgres}
      - PG_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # 智能问数：/query 网关鉴权密钥（架构文档 §4.2），仅 agent-query 网关持有
      - AGENT_API_KEY=${AGENT_API_KEY}
    volumes:
      - duckdb-cache:/var/lib/duckdb/cache
    networks:
      - insforge-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  deno_cache:
  storage-data:
  insforge-logs:
  duckdb-cache:

networks:
  insforge-network:
    driver: bridge
