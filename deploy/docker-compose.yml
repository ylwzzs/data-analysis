# deploy/docker-compose.yml
# InsForge 数据分析平台部署编排
# 使用：cd deploy && cp .env.example .env（填入实际配置）&& docker compose up -d

services:
  insforge:
    image: insforge/insforge:latest
    container_name: insforge-app
    restart: unless-stopped
    ports:
      - "7130:7130"
      - "7131:7131"
      - "7133:7133"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-insforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - STORAGE_TYPE=minio
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_BUCKET=${STORAGE_BUCKET:-data}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - WECOM_CORP_ID=${WECOM_CORP_ID}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID}
      - WECOM_SECRET=${WECOM_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - insforge-network

  postgres:
    image: postgres:15-alpine
    container_name: insforge-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-insforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - insforge-network

  minio:
    image: minio/minio:latest
    container_name: insforge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-insforge}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - insforge-network

  nginx:
    image: nginx:alpine
    container_name: insforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - insforge
    networks:
      - insforge-network

volumes:
  postgres_data:
  minio_data:

networks:
  insforge-network:
    driver: bridge
