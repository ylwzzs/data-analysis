# deploy/docker-compose.prod.yml
# 生产 override —— 叠加在 base 后端栈（docker-compose.yml）上，加入前端 web 与 nginx 网关。
# 用法：cd deploy && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# 指定 -f 后 docker-compose.override.yml（dev 端口映射）不再自动合并，后端端口保持内部、不对公网暴露。

services:
  # 后端 API 仅绑定宿主机 loopback，供服务器上的部署脚本（deploy-functions.sh）访问；
  # 不对公网暴露 —— 公网一律经 nginx 的 80/443 访问。
  insforge:
    ports:
      - "127.0.0.1:${APP_PORT:-7130}:7130"

  web:
    # 前端镜像由 GitHub Actions 构建并推送到天翼云镜像服务（hookflow/data-analysis-web）
    image: registry-crs-xinan1.ctyun.cn/hookflow/data-analysis-web:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # InsForge SDK（服务端 API Routes 使用）
      - INSFORGE_API_BASE=http://insforge:7130
      - INSFORGE_API_KEY=${ANON_KEY}
      # 乐檬签名密钥（collect-lemeng function 需要）
      - LEMENG_SECRET_KEY=${LEMENG_SECRET_KEY}
    depends_on:
      - insforge
    networks:
      - insforge-network
    # 不映射宿主机端口；仅 nginx 在内网通过 web:3000 访问

  # openclaw Agent 服务
  openclaw:
    image: caj9ik14016wep-ghcr.xuanyuan.run/openclaw/openclaw:latest
    container_name: deploy-openclaw-1
    restart: unless-stopped
    env_file:
      - path: ../openclaw/.env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_GATEWAY_MODE: local
      TZ: Asia/Shanghai
      # 模型提供商 API Key（自定义 wishub）
      WISHUB_API_KEY: ${WISHUB_API_KEY:-}
    volumes:
      - "../openclaw/state:/home/node/.openclaw"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18789:18789"  # Gateway Control UI
    networks:
      - insforge-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - insforge

  nginx:
    image: caj9ik14016wep.xuanyuan.run/jonasal/nginx-certbot:latest
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${LETSENCRYPT_EMAIL}
      # =1 使用 Let's Encrypt 测试环境（不限频、出测试证书），调试时打开
      - STAGING=${LETSENCRYPT_STAGING:-0}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # server.conf 由 scripts/deploy.sh 从 server.conf.tpl + .env 的 DOMAIN 生成
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      - nginx_secrets:/etc/letsencrypt
      # 企微可信域名验证文件（WW_verify_*.txt）
      - ./nginx/verify:/etc/nginx/verify:ro
    depends_on:
      - web
      - insforge
      - openclaw
    networks:
      - insforge-network

volumes:
  nginx_secrets: