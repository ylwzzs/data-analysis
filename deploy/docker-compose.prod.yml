# deploy/docker-compose.prod.yml
# 生产 override —— 叠加在 base 后端栈（docker-compose.yml）上，加入前端 web 与 nginx 网关。
# 用法：cd deploy && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# 指定 -f 后 docker-compose.override.yml（dev 端口映射）不再自动合并，后端端口保持内部、不对公网暴露。

services:
  # 后端 API 仅绑定宿主机 loopback，供服务器上的部署脚本（deploy-functions.sh）访问；
  # 不对公网暴露 —— 公网一律经 nginx 的 80/443 访问。
  insforge:
    ports:
      - "127.0.0.1:${APP_PORT:-7130}:7130"

  web:
    # 前端镜像由 GitHub Actions 构建并推送到天翼云镜像服务（hookflow/data-analysis-web）
    image: registry-crs-xinan1.ctyun.cn/hookflow/data-analysis-web:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - insforge
    networks:
      - insforge-network
    # 不映射宿主机端口；仅 nginx 在内网通过 web:3000 访问

  # openclaw Agent 服务
  openclaw:
    image: openclaw/openclaw:latest
    container_name: deploy-openclaw-1
    restart: unless-stopped
    volumes:
      - ../openclaw/config.yaml:/app/config.yaml:ro
      - ../openclaw/.env:/app/.env:ro
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - insforge
    networks:
      - insforge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: caj9ik14016wep.xuanyuan.run/jonasal/nginx-certbot:latest
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${LETSENCRYPT_EMAIL}
      # =1 使用 Let's Encrypt 测试环境（不限频、出测试证书），调试时打开
      - STAGING=${LETSENCRYPT_STAGING:-0}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # server.conf 由 scripts/deploy.sh 从 server.conf.tpl + .env 的 DOMAIN 生成
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      - nginx_secrets:/etc/letsencrypt
      # 企微可信域名验证文件（WW_verify_*.txt）
      - ./nginx/verify:/etc/nginx/verify:ro
    depends_on:
      - web
      - insforge
      - openclaw
    networks:
      - insforge-network

volumes:
  nginx_secrets:
